name: Build

# Triggered by the v<version> tag pushed from release.yml. Builds, signs, and
# publishes the desktop app for every platform, attaching the updater manifest
# (latest.json) that installed apps poll.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: bun install --frozen-lockfile

      - name: Extract latest changelog entry
        run: |
          node -e "
          const fs = require('fs');
          try {
            const content = fs.readFileSync('CHANGELOG.md', 'utf8');
            const lines = content.split('\n');
            let result = [];
            let foundFirst = false;
            for (const line of lines) {
              if (line.startsWith('## [')) {
                if (foundFirst) break;
                foundFirst = true;
                continue;
              }
              if (foundFirst) {
                result.push(line);
              }
            }
            const body = result.join('\n').trim() || 'Download the asset for your platform. Installed apps update automatically.';
            fs.appendFileSync(process.env.GITHUB_ENV, 'RELEASE_BODY<<EOF\n' + body + '\nEOF\n');
          } catch (err) {
            console.error(err);
            fs.appendFileSync(process.env.GITHUB_ENV, 'RELEASE_BODY<<EOF\nDownload the asset for your platform. Installed apps update automatically.\nEOF\n');
          }
          "

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Jelly ${{ github.ref_name }}"
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
