name: Release

# Manually triggered from GitHub Actions UI.
# Pick patch / minor / major — release-it bumps the version in
# apps/desktop/package.json, writes CHANGELOG.md, commits, and pushes a
# v<version> tag, which triggers build.yml to build + sign + publish.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT so the pushed tag triggers build.yml (the default GITHUB_TOKEN
          # does not trigger downstream workflows). Falls back to GITHUB_TOKEN
          # if RELEASE_TOKEN is unset — you'd then need to trigger build.yml manually.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump, changelog, tag, push
        run: bun run release:ci -- --increment=${{ inputs.bump }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
